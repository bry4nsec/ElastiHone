<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ElastiHone — Detection rule fine-tuning for Elastic Security">
    <title>ElastiHone — Detection Rule Fine-Tuner</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230077cc'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-weight='700' font-size='16' fill='white' text-anchor='middle'%3EEH%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="topnav">
        <div class="topnav-inner">
            <a href="/" class="topnav-brand">
                <span class="topnav-name">Elasti<strong>Hone</strong></span>
            </a>
            <div class="topnav-links">
                <a href="/" class="topnav-link" id="nav-analyse">Fine-Tuner</a>
                <a href="/metrics" class="topnav-link" id="nav-metrics">Metrics</a>
                <a href="/settings" class="topnav-link" id="nav-settings">Settings</a>
                <button onclick="toggleTheme()" class="topnav-link" style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;padding:8px 12px;display:flex;align-items:center;" title="Toggle light/dark theme" id="theme-toggle"><svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="app-footer">
        <div class="container footer-inner">
            <span class="footer-brand">ElastiHone v0.2.0</span>
            <span class="footer-sep">&middot;</span>
            <span>Detection Rule Fine-Tuning</span>
            <span class="footer-sep">&middot;</span>
            <span class="footer-muted">Open Source</span>
        </div>
    </footer>
<script>
function toggleTheme() {
    const body = document.body;
    const current = body.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', next);
    localStorage.setItem('sda-theme', next);
    document.getElementById('theme-icon-dark').style.display = next === 'dark' ? 'block' : 'none';
    document.getElementById('theme-icon-light').style.display = next === 'light' ? 'block' : 'none';
}
// Restore saved theme
(function() {
    const saved = localStorage.getItem('sda-theme') || 'dark';
    document.body.setAttribute('data-theme', saved);
    document.getElementById('theme-icon-dark').style.display = saved === 'dark' ? 'block' : 'none';
    document.getElementById('theme-icon-light').style.display = saved === 'light' ? 'block' : 'none';
})();
</script>
</body>
</html>
